apiVersion: v1
kind: Service
metadata:
  name: nginx-lb       # Nome novo para não conflitar com o original
  namespace: default
spec:
  type: LoadBalancer
  selector:
    # Estes seletores buscam os pods do Prometheus já existentes.
    # No kube-prometheus-stack padrão, geralmente é este:
    app: nginx 
  ports:
    - protocol: TCP
      port: 8888      # A porta externa que você quer usar na rede
      targetPort: 80     # A porta interna onde o Prometheus roda