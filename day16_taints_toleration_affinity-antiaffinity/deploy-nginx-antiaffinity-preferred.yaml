apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx
  name: nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: nginx
        name: nginx
        ports:
        - containerPort: 80
      affinity:
        podAntiAffinity:
          #requiredDuringSchedulingIgnoredDuringExecution: # Obrigatório para o agendamento, mas pode ser ignorado durante a execução
          preferredDuringSchedulingIgnoredDuringExecution: # Preferencial para o agendamento, mas pode ser ignorado durante a execução
          - weight: 100 # A prioridade de agendamento é determinada pelo peso, onde 100 é a prioridade máxima
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: nginx
              topologyKey: "region" # Garante que os pods sejam agendados em nós diferentes, evitando que fiquem no mesmo nó